name: Ragnarok CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dependencies
        run: go mod download

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v -race ./...

      - name: Build Unified Binary (rag)
        run: go build -v -o rag ./cmd/rag/main.go

      - name: Ragnarok Doctor
        run: ./rag mcp diagnose
        # Note: This might need specific config if it requires DBs to exist.
        # For CI, we target the help command as a smoke test.
        continue-on-error: true
